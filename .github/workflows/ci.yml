name: DevSecOps CI Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  security-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install bandit pytest

      - name: Run Bandit
        run: |
          bandit -r flaskr/ -ll -f json -o bandit-report.json || true
          echo "Bandit scan completed"

      - name: Install Trivy
        run: |
          wget https://github.com/aquasecurity/trivy/releases/download/v0.48.0/trivy_0.48.0_Linux-64bit.deb
          sudo dpkg -i trivy_0.48.0_Linux-64bit.deb
          trivy --version

      - name: Run Trivy
        run: |
          trivy fs . --format json --output trivy-report.json --severity CRITICAL,HIGH,MEDIUM || true
          echo "Trivy scan completed"

      - name: Install Gitleaks
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/download/v8.16.0/gitleaks_8.16.0_linux_x64.tar.gz
          tar -xzf gitleaks_8.16.0_linux_x64.tar.gz
          chmod +x gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          gitleaks detect --source . --verbose --no-git || true

      - name: Upload reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            trivy-report.json
