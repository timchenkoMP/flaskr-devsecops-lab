name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install bandit pytest

      - name: Run tests
        run: pytest tests/ -v || true

      - name: Bandit SAST
        run: |
          bandit -r flaskr/ -ll -f json -o bandit-report.json || true

      - name: Trivy SCA
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-report.json'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload SAST reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            trivy-report.json

  dast-scan:
    runs-on: ubuntu-latest
    needs: static-analysis
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start Flask app
        run: |
          flask --app flaskr run --host=0.0.0.0 --port=5000 &
          sleep 10

      - name: Run OWASP ZAP baseline scan
        run: |
          mkdir -p zap-reports
          docker run --rm \
            -v $(pwd)/zap-reports:/zap/wrk:rw \
            --add-host=host.docker.internal:host-gateway \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://host.docker.internal:5000 \
            -J zap-report.json \
            -r zap-report.html \
            || echo "ZAP scan completed with findings"

      - name: Upload DAST reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dast-reports
          path: zap-reports/

  security-gate:
    runs-on: ubuntu-latest
    needs: [static-analysis, dast-scan]
    if: always()
    steps:
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Download SAST reports
        uses: actions/download-artifact@v4
        with:
          name: sast-reports
          path: sast-reports/
        continue-on-error: true

      - name: Download DAST reports
        uses: actions/download-artifact@v4
        with:
          name: dast-reports
          path: dast-reports/
        continue-on-error: true

      - name: Check for CRITICAL in Trivy report
        run: |
          if [ -f sast-reports/trivy-report.json ]; then
            CRITICAL_COUNT=$(jq '.Results[].Vulnerabilities[] | select(.Severity=="CRITICAL")' sast-reports/trivy-report.json | wc -l) || echo 0
            if [ "$CRITICAL_COUNT" -gt 0 ]; then
              echo "Found $CRITICAL_COUNT CRITICAL vulnerabilities!"
              exit 1
            fi
          fi
        continue-on-error: true

      - name: Check for HIGH alerts in ZAP report
        run: |
          if [ -f dast-reports/zap-report.json ]; then
            HIGH_COUNT=$(jq '.site[].alerts[] | select(.risk=="High")' dast-reports/zap-report.json | wc -l) || echo 0
            if [ "$HIGH_COUNT" -gt 0 ]; then
              echo "Found $HIGH_COUNT HIGH risk vulnerabilities!"
              exit 1
            fi
          else
            echo "ZAP report not found"
          fi
        continue-on-error: true

      - name: Security gate passed
        run: echo "All security checks passed!"
